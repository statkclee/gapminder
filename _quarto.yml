project:
  type: default
  output-dir: docs
  # 모든 문서의 작업 디렉토리를 프로젝트 루트로 고정 → data/, figures/ 상대경로 일관
  execute-dir: project
  # 렌더 대상 명시 (document/*.md 등 산출물이 딸려 렌더되는 것 방지)
  render:
    - index.qmd
    - eda_report.qmd

# 포맷은 per-document로 둔다:
#   eda_report.qmd    → html 보고서 (toc/code-fold)
#   eda_dashboard.qmd → dashboard
# 두 포맷 옵션이 달라 여기서 끌어올리지 않는다.

lang: ko
execute:
  warning: false
  message: false
